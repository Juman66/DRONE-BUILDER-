<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drone Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <div class="header">
      <h1>🚀 Drone Builder</h1>
      <p>Build your custom drone</p>
    </div>

    <div id="categories"></div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="preview">
      <h3>Drone Preview</h3>
      <img id="droneImage" src="https://via.placeholder.com/400x250">
    </div>

    <div class="summary">
      <h3>Selected Components</h3>
      <div id="summary"></div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
